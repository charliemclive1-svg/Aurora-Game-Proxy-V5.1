<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aurora | Game Proxy</title>
    <link rel="stylesheet" href="/static/style.css">
</head>
<body>
    <div class="sidebar">
        <h2>🌌 Aurora</h2>
        <ul>
            <li><a href="/">Dashboard</a></li>
            <li><a href="/games">Games</a></li>
            <li><a href="#" onclick="openProxyWindow()">Proxy Settings</a></li>
        </ul>
    </div>
    <div class="main-content">
        <h1>Welcome to Aurora</h1>
        <p>Bypass network restrictions securely and play your favorite web games.</p>
        
        <div class="search-bar">
            <form onsubmit="routeProxy(event)">
                <input type="text" id="url-input" placeholder="Enter game URL or search..." />
                <button type="submit">Launch</button>
            </form>
        </div>
    </div>

    <script src="/static/uv/uv.bundle.js"></script>
    <script src="/static/uv/uv.config.js"></script>
    <script src="/static/index.js"></script>
</body>
</html>
